name: CI
on:
  push:
    branches: [main]
  pull_request:
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install uv
      - run: uv sync
      - run: uv run ruff check kb tests
      - run: uv run ruff format --check kb tests
      - run: uv run mypy kb
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install uv
      - run: uv sync
      - run: uv run pytest
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - run: npm install
        working-directory: web
      - run: npm test
        working-directory: web
      - run: npm run build
        working-directory: web
