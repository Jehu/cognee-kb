name: CI
on:
  push:
    branches: [main]
  pull_request:
jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install uv
      - run: uv sync
      # Python: fail-closed. Transitive CVE-Pakete (multipart/pyjwt/pillow) sind
      # via override-deps in pyproject.toml auf gefixte Versionen angehoben.
      # CVE-2025-68481 (fastapi-users) wird geduldet: kb nutzt fastapi-users
      # nicht direkt (Bearer-Token via secrets); es kommt transitiv ueber Cognee.
      # CVE-2025-69872 (diskcache) wird geduldet, solange es upstream keine
      # gefixte Version gibt; es kommt transitiv ueber Cognee.
      - run: uv run --with pip-audit pip-audit --ignore-vuln CVE-2025-68481 --ignore-vuln CVE-2025-69872
      - uses: actions/setup-node@v4
        with: { node-version: "22" }
      - run: npm install
        working-directory: web
      # Web: nur auf high/critical failen (low wird manuell triagiert).
      - run: npm audit --omit=dev --audit-level=high
        working-directory: web
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install uv
      - run: uv sync
      - run: uv run ruff check kb tests
      - run: uv run ruff format --check kb tests
      - run: uv run mypy kb
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install uv
      - run: uv sync
      - run: uv run pytest
      - uses: actions/setup-node@v4
        with: { node-version: "22" }
      - run: npm install
        working-directory: web
      - run: npm test
        working-directory: web
      - run: npm run build
        working-directory: web
